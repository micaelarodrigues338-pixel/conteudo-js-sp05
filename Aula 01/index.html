<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 JavaScript</title>
</head>
<body>

    <!-- Intodução ao Java Script -->
    <h2>Introdução ao JavaScript</h2>

<h2>Exemplo de funcionamento de JavaScript</h2>
<p id="ex1">Somente a dor coletiva gera união</p>
<button onclick="document.getElementById('ex1').innerHTML= 'A turma SP05 é supimpa'">Clique aqui!</button>

<hr>
<p id="ex2"> Somente a dor coletiva gera união </p>
<button onclick="document.getElementById('ex2').style.fontSize = '40px'">Clique aqui!</button>
<hr>
<p id="ex3">Somente a dor coletiva gera união</p>
<button onclick="document.getElementById('ex3').style.display = 'none'">Clique aqui!</button>
<hr>
<p>Exibendo conteudo</p>
<p id="ex4" style="display: none;">Somente a dor gera a união</p>
<button onclick="document.getElementById('ex4').style.display = 'block'">Clique aqui!</button>

</body>
</html>
